<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Edit Student' : 'Add Student'">Student Form</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 500px; margin: 0 auto; padding: 2rem 1rem; }
        h1 { font-size: 1.6rem; margin-bottom: 1.5rem; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; color: #555; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; transition: border-color .15s; }
        .form-group input:focus { outline: none; border-color: #4CAF50; box-shadow: 0 0 0 2px rgba(76,175,80,.15); }
        .form-group input.error { border-color: #e53935; }
        .form-group input[readonly] { background: #f5f5f5; color: #999; }
        .error-msg { color: #e53935; font-size: 0.8rem; margin-top: 4px; }
        .form-actions { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
        .btn { display: inline-flex; align-items: center; gap: 4px; padding: 10px 20px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; text-decoration: none; color: #fff; transition: opacity .15s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #4CAF50; }
        .btn-secondary { background: #888; }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${isEdit} ? 'Edit Student' : 'Add Student'">Student Form</h1>

    <div class="card">
        <form th:action="${isEdit} ? @{/students/{id}(id=${student.id})} : @{/students}"
              th:object="${student}" method="post">

            <div class="form-group" th:if="${isEdit}">
                <label for="id">ID</label>
                <input type="text" id="id" th:field="*{id}" readonly>
            </div>

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="e.g. Nguyen Van A"
                       th:classappend="${#fields.hasErrors('name')} ? 'error'">
                <div class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" th:field="*{email}" placeholder="e.g. nva@hcmut.edu.vn"
                       th:classappend="${#fields.hasErrors('email')} ? 'error'">
                <div class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" th:field="*{age}" min="1" max="150" placeholder="e.g. 20"
                       th:classappend="${#fields.hasErrors('age')} ? 'error'">
                <div class="error-msg" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update' : 'Create'">Save</button>
                <a th:href="@{/students}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
